spring.application.name=reserba

itemconfig.name = item
itemconfig.value = milk




# This tells Hibernate not to interfere with Flyway
spring.jpa.hibernate.ddl-auto=validate

# Optional: specifically tell Flyway where to look
spring.flyway.locations=classpath:db/migration

# Force JPA to wait for Flyway
spring.flyway.enabled=true

spring.profiles.active=prod
